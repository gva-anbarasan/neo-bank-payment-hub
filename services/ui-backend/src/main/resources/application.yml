spring:
  application:
    name: ui-backend
  profiles:
    active: default

---
# Default profile (local development)
spring:
  config:
    activate:
      on-profile: default
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ui-backend-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  redis:
    host: localhost
    port: 6379

server:
  port: 8080

logging:
  level:
    com.neobank: DEBUG

---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: ui-backend-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  redis:
    host: redis
    port: 6379

server:
  port: 8080
  address: 0.0.0.0

logging:
  level:
    com.neobank: INFO

---
# Production profile
spring:
  config:
    activate:
      on-profile: production
  kafka:
    bootstrap-servers: kafka-prod:9092,kafka-prod2:9092
    consumer:
      group-id: ui-backend-group-prod
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        enable-idempotence: true
        isolation.level: read_committed
  redis:
    host: redis-prod
    port: 6379
    password: ${REDIS_PASSWORD}
    ssl: true

server:
  port: 8080
  address: 0.0.0.0

logging:
  level:
    com.neobank: WARN
  file:
    name: /var/log/ui-backend/app.log